<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Charity Marketplace - GAC</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"
    />
  </head>
  <body class="bg-gray-50">
    <!-- Navigation -->
    <div th:replace="fragments/layout :: navbar"></div>

    <!-- Search Bar -->
    <div class="bg-white border-b sticky top-0 z-40">
      <div class="max-w-7xl mx-auto px-4 py-3">
        <div class="flex gap-2 items-center">
          <input
            type="text"
            id="searchInput"
            placeholder="Search charity actions..."
            class="flex-1 px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          <button
            onclick="searchActions()"
            class="bg-blue-600 text-white px-6 py-2 rounded-lg hover:bg-blue-700 transition"
          >
            <i class="fas fa-search"></i> Search
          </button>
          <select
            id="categoryFilter"
            onchange="filterByCategory()"
            class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          >
            <option value="">All Categories</option>
            <option value="health">Health</option>
            <option value="education">Education</option>
            <option value="food">Food</option>
            <option value="shelter">Shelter</option>
            <option value="disaster">Disaster Relief</option>
          </select>
        </div>
      </div>
    </div>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto px-4 py-8">
      <!-- Featured Banner -->
      <div
        class="bg-gradient-to-r from-blue-600 to-purple-600 rounded-lg p-8 mb-8 text-white"
      >
        <h1 class="text-4xl font-bold mb-2">Make a Difference Today</h1>
        <p class="text-lg opacity-90">
          Join thousands of generous donors supporting charitable causes
        </p>
        <div class="mt-4 text-sm">
          <span class="mr-6"
            ><i class="fas fa-check-circle"></i> Verified Organizations</span
          >
          <span class="mr-6"
            ><i class="fas fa-shield-alt"></i> Secure Donations</span
          >
          <span><i class="fas fa-heart"></i> 100% Transparent</span>
        </div>
      </div>

      <!-- Stats Bar -->
      <div class="grid grid-cols-4 gap-4 mb-8">
        <div class="bg-white p-4 rounded-lg shadow text-center">
          <div class="text-3xl font-bold text-blue-600" id="stat-actions">
            0
          </div>
          <div class="text-gray-600 text-sm">Active Causes</div>
        </div>
        <div class="bg-white p-4 rounded-lg shadow text-center">
          <div class="text-3xl font-bold text-green-600" id="stat-donors">
            0
          </div>
          <div class="text-gray-600 text-sm">Active Donors</div>
        </div>
        <div class="bg-white p-4 rounded-lg shadow text-center">
          <div class="text-3xl font-bold text-purple-600" id="stat-donated">
            $0
          </div>
          <div class="text-gray-600 text-sm">Total Donations</div>
        </div>
        <div class="bg-white p-4 rounded-lg shadow text-center">
          <div class="text-3xl font-bold text-orange-600" id="stat-mypart">
            0
          </div>
          <div class="text-gray-600 text-sm">My Participations</div>
        </div>
      </div>

      <!-- Products/Actions Grid -->
      <div class="mb-8">
        <div class="flex justify-between items-center mb-6">
          <h2 class="text-2xl font-bold">Featured Causes</h2>
          <select
            id="sortBy"
            onchange="sortActions()"
            class="px-4 py-2 border border-gray-300 rounded-lg"
          >
            <option value="recent">Most Recent</option>
            <option value="trending">Trending</option>
            <option value="goal">Most Funded</option>
            <option value="urgent">Most Urgent</option>
          </select>
        </div>

        <div
          id="actions-grid"
          class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6"
        >
          <!-- Actions will be populated here -->
        </div>
      </div>
    </div>

    <!-- Footer -->
    <div th:replace="fragments/layout :: footer"></div>

    <!-- Donation Modal -->
    <div
      id="donationModal"
      class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center"
    >
      <div class="bg-white rounded-lg p-8 max-w-md w-full mx-4">
        <h3 class="text-2xl font-bold mb-4">Make a Donation</h3>
        <div id="modalContent"></div>
        <div class="mt-6 space-y-3">
          <input
            type="number"
            id="donationAmount"
            placeholder="Amount ($)"
            min="1"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
          />
          <textarea
            id="donationMessage"
            placeholder="Your message (optional)"
            class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
            rows="3"
          ></textarea>
          <button
            onclick="submitDonation()"
            class="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold"
          >
            <i class="fas fa-heart"></i> Donate Now
          </button>
          <button
            onclick="closeModal()"
            class="w-full bg-gray-300 text-gray-700 py-2 rounded-lg hover:bg-gray-400 transition"
          >
            Cancel
          </button>
        </div>
      </div>
    </div>

    <script>
      let allActions = [];
      let currentActionId = null;

      // Initialize dashboard
      async function initDashboard() {
        try {
          const response = await fetch("/api/actions/public/active");
          if (response.ok) {
            allActions = await response.json();
            renderGrid(allActions);
          }

          // Load stats
          const statsResponse = await fetch("/api/actions/public/stats");
          if (statsResponse.ok) {
            const stats = await statsResponse.json();
            updateStats(stats);
          }
        } catch (error) {
          console.error("Error loading data:", error);
        }
      }

      function updateStats(stats) {
        document.getElementById("stat-actions").textContent =
          stats.totalActions || 0;
        document.getElementById("stat-donors").textContent =
          stats.activeUsers || 0;
        document.getElementById("stat-donated").textContent =
          "$" + (stats.totalDonations || 0);
        document.getElementById("stat-mypart").textContent =
          stats.myParticipations || 0;
      }

      function renderGrid(actions) {
        const grid = document.getElementById("actions-grid");
        if (actions.length === 0) {
          grid.innerHTML =
            '<p class="col-span-4 text-center text-gray-500 py-8">No causes found</p>';
          return;
        }

        grid.innerHTML = actions
          .map(
            (action) => `
          <div class="bg-white rounded-lg shadow hover:shadow-xl transition overflow-hidden group">
            <!-- Image -->
            <div class="relative h-48 bg-gradient-to-br from-blue-400 to-blue-600 overflow-hidden">
              <div class="absolute inset-0 flex items-center justify-center">
                <i class="fas fa-heart text-white text-6xl opacity-20"></i>
              </div>
              <div class="absolute top-2 right-2 bg-red-500 text-white px-3 py-1 rounded-full text-sm font-semibold">
                ${action.urgencyLevel || "High"}
              </div>
            </div>

            <!-- Content -->
            <div class="p-4">
              <h3 class="font-bold text-lg mb-2 line-clamp-2">${action.title || "Charity Action"}</h3>
              <p class="text-gray-600 text-sm mb-3 line-clamp-2">${action.description || "Help make a difference"}</p>

              <!-- Organization -->
              <div class="flex items-center mb-3 pb-3 border-b">
                <div class="w-8 h-8 bg-gray-300 rounded-full mr-2"></div>
                <span class="text-sm text-gray-700">${action.organisationName || "Organization"}</span>
              </div>

              <!-- Progress Bar -->
              <div class="mb-3">
                <div class="flex justify-between text-xs mb-1">
                  <span class="font-semibold">$${action.collectedAmount || 0}</span>
                  <span class="text-gray-600">$${action.targetAmount || 0}</span>
                </div>
                <div class="w-full bg-gray-200 rounded-full h-2">
                  <div
                    class="bg-blue-600 h-2 rounded-full"
                    style="width: ${
                      action.targetAmount
                        ? Math.min(
                            (action.collectedAmount / action.targetAmount) *
                              100,
                            100,
                          )
                        : 0
                    }%"
                  ></div>
                </div>
              </div>

              <!-- Category Badge -->
              <div class="mb-4">
                <span class="inline-block bg-blue-100 text-blue-800 text-xs px-2 py-1 rounded">
                  ${action.category || "Charity"}
                </span>
              </div>

              <!-- Action Buttons -->
              <div class="flex gap-2">
                <button
                  onclick="openDonationModal(${action.id}, '${action.title}')"
                  class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-semibold text-sm"
                >
                  <i class="fas fa-heart"></i> Donate
                </button>
                <button
                  onclick="viewDetails(${action.id})"
                  class="flex-1 bg-gray-200 text-gray-700 py-2 rounded-lg hover:bg-gray-300 transition text-sm"
                >
                  <i class="fas fa-info-circle"></i> Details
                </button>
              </div>

              <!-- Stats -->
              <div class="mt-3 pt-3 border-t text-xs text-gray-600 flex justify-between">
                <span><i class="fas fa-users"></i> ${action.participantCount || 0} supporters</span>
                <span><i class="fas fa-calendar"></i> ${formatDate(action.createdAt)}</span>
              </div>
            </div>
          </div>
        `,
          )
          .join("");
      }

      function formatDate(dateString) {
        if (!dateString) return "Recently";
        const date = new Date(dateString);
        const now = new Date();
        const diff = Math.floor((now - date) / 1000);

        if (diff < 60) return "Just now";
        if (diff < 3600) return Math.floor(diff / 60) + "m ago";
        if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
        return Math.floor(diff / 86400) + "d ago";
      }

      function openDonationModal(actionId, actionTitle) {
        currentActionId = actionId;
        const modal = document.getElementById("donationModal");
        const content = document.getElementById("modalContent");
        content.innerHTML = `<p class="text-gray-600 mb-4">You're supporting: <strong>${actionTitle}</strong></p>`;
        modal.classList.remove("hidden");
      }

      function closeModal() {
        document.getElementById("donationModal").classList.add("hidden");
        document.getElementById("donationAmount").value = "";
        document.getElementById("donationMessage").value = "";
        currentActionId = null;
      }

      async function submitDonation() {
        const amount = document.getElementById("donationAmount").value;
        const message = document.getElementById("donationMessage").value;

        if (!amount || amount <= 0) {
          alert("Please enter a valid amount");
          return;
        }

        try {
          const response = await fetch("/api/donations", {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            body: JSON.stringify({
              actionChariteId: currentActionId,
              amount: parseFloat(amount),
              message: message,
            }),
          });

          if (response.ok) {
            alert("Thank you for your donation! 🎉");
            closeModal();
            // Reload data
            initDashboard();
          } else {
            alert("Failed to process donation. Please try again.");
          }
        } catch (error) {
          console.error("Error submitting donation:", error);
          alert("Error processing donation");
        }
      }

      function searchActions() {
        const query = document
          .getElementById("searchInput")
          .value.toLowerCase();
        const filtered = allActions.filter(
          (action) =>
            (action.title && action.title.toLowerCase().includes(query)) ||
            (action.description &&
              action.description.toLowerCase().includes(query)),
        );
        renderGrid(filtered);
      }

      function filterByCategory() {
        const category = document.getElementById("categoryFilter").value;
        if (!category) {
          renderGrid(allActions);
          return;
        }
        const filtered = allActions.filter((action) =>
          action.category?.toLowerCase().includes(category),
        );
        renderGrid(filtered);
      }

      function sortActions() {
        const sortBy = document.getElementById("sortBy").value;
        let sorted = [...allActions];

        switch (sortBy) {
          case "trending":
            sorted.sort(
              (a, b) => (b.participantCount || 0) - (a.participantCount || 0),
            );
            break;
          case "goal":
            sorted.sort(
              (a, b) => (b.collectedAmount || 0) - (a.collectedAmount || 0),
            );
            break;
          case "urgent":
            sorted.sort((a, b) => {
              const urgencyMap = { "Very High": 3, High: 2, Medium: 1 };
              return (
                (urgencyMap[b.urgencyLevel] || 0) -
                (urgencyMap[a.urgencyLevel] || 0)
              );
            });
            break;
          default: // recent
            sorted.sort(
              (a, b) => new Date(b.createdAt) - new Date(a.createdAt),
            );
        }
        renderGrid(sorted);
      }

      function viewDetails(actionId) {
        const action = allActions.find((a) => a.id === actionId);
        if (action) {
          // Create a simple details view or navigate to details page
          alert(`
Title: ${action.title}
Organization: ${action.organisationName}
Goal: $${action.targetAmount}
Collected: $${action.collectedAmount}
Category: ${action.category}
Urgency: ${action.urgencyLevel}

To support this cause, click the Donate button!
          `);
        }
      }

      // Load on page load
      window.addEventListener("load", initDashboard);

      // Close modal when clicking outside
      document
        .getElementById("donationModal")
        ?.addEventListener("click", (e) => {
          if (e.target.id === "donationModal") closeModal();
        });
    </script>
  </body>
</html>
