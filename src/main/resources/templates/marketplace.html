<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Marketplace - GAC Charity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-gray-50">
    <div th:replace="fragments/layout :: navbar"></div>

    <div class="flex">
        <div th:replace="fragments/layout :: sidebar"></div>

        <main class="flex-1 ml-64 p-6">
            <!-- Hero Banner -->
            <div class="bg-gradient-to-r from-blue-600 via-blue-700 to-purple-700 rounded-xl p-8 mb-8 text-white">
                <div class="max-w-3xl">
                    <h1 class="text-3xl font-bold mb-2">Charity Marketplace</h1>
                    <p class="text-blue-100 mb-6">Browse causes, donate, and make a difference in someone's life today.</p>
                    <div class="flex gap-6 text-sm">
                        <span><i class="fas fa-check-circle"></i> Verified Causes</span>
                        <span><i class="fas fa-shield-alt"></i> Secure Donations</span>
                        <span><i class="fas fa-heart"></i> 100% Transparent</span>
                    </div>
                </div>
            </div>

            <!-- Search & Filter -->
            <div class="bg-white rounded-xl shadow-sm border p-4 mb-6">
                <div class="flex flex-wrap gap-3 items-center">
                    <div class="flex-1 min-w-[200px] relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="searchInput" placeholder="Search causes..." oninput="filterActions()" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <select id="categoryFilter" onchange="filterActions()" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <option value="">All Categories</option>
                        <option value="EDUCATION">Education</option>
                        <option value="HEALTH">Health</option>
                        <option value="ENVIRONMENT">Environment</option>
                        <option value="POVERTY">Poverty</option>
                        <option value="DISASTER_RELIEF">Disaster Relief</option>
                        <option value="ANIMAL_WELFARE">Animal Welfare</option>
                        <option value="OTHER">Other</option>
                    </select>
                    <select id="orgFilter" onchange="filterActions()" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <option value="">All Organizations</option>
                    </select>
                    <select id="sortBy" onchange="filterActions()" class="px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 text-sm">
                        <option value="recent">Most Recent</option>
                        <option value="popular">Most Popular</option>
                        <option value="goal">Highest Goal</option>
                        <option value="progress">Most Funded</option>
                    </select>
                </div>
            </div>

            <!-- Stats Bar -->
            <div class="grid grid-cols-2 lg:grid-cols-4 gap-4 mb-8">
                <div class="bg-white rounded-xl shadow-sm border p-4 text-center">
                    <div class="text-2xl font-bold text-blue-600" id="stat-actions">0</div>
                    <div class="text-xs text-gray-500">Active Causes</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border p-4 text-center">
                    <div class="text-2xl font-bold text-green-600" id="stat-orgs">0</div>
                    <div class="text-xs text-gray-500">Organizations</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border p-4 text-center">
                    <div class="text-2xl font-bold text-purple-600" id="stat-donated">$0</div>
                    <div class="text-xs text-gray-500">Total Donations</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border p-4 text-center">
                    <div class="text-2xl font-bold text-orange-600" id="stat-causes">0</div>
                    <div class="text-xs text-gray-500">Categories</div>
                </div>
            </div>

            <!-- Products Grid -->
            <div class="mb-8">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-xl font-bold text-gray-800">All Causes</h2>
                    <span class="text-sm text-gray-500" id="results-count">0 results</span>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="actions-grid">
                </div>
            </div>
        </main>
    </div>

    <div th:replace="fragments/layout :: footer"></div>

    <!-- Donation Modal -->
    <div id="donationModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl p-8 max-w-md w-full mx-4">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-gray-800">Make a Donation</h3>
                <button onclick="closeModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <div id="modalContent"></div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Amount ($)</label>
                    <div class="flex gap-2 mb-2">
                        <button onclick="setAmount(10)" class="flex-1 py-2 text-sm border border-gray-300 rounded-lg hover:bg-blue-50 hover:border-blue-500 transition">$10</button>
                        <button onclick="setAmount(25)" class="flex-1 py-2 text-sm border border-gray-300 rounded-lg hover:bg-blue-50 hover:border-blue-500 transition">$25</button>
                        <button onclick="setAmount(50)" class="flex-1 py-2 text-sm border border-gray-300 rounded-lg hover:bg-blue-50 hover:border-blue-500 transition">$50</button>
                        <button onclick="setAmount(100)" class="flex-1 py-2 text-sm border border-gray-300 rounded-lg hover:bg-blue-50 hover:border-blue-500 transition">$100</button>
                    </div>
                    <input type="number" id="donationAmount" placeholder="Custom amount" min="1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Message (optional)</label>
                    <textarea id="donationMessage" placeholder="Leave a supportive message..." rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <button onclick="submitDonation()" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-semibold">
                    <i class="fas fa-heart"></i> Donate Now
                </button>
                <button onclick="closeModal()" class="w-full py-2 text-gray-500 hover:text-gray-700 transition text-sm">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Details Modal -->
    <div id="detailsModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl p-8 max-w-2xl w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-gray-800" id="detail-title">Action Details</h3>
                <button onclick="closeDetails()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <div id="detailContent" class="space-y-4"></div>
        </div>
    </div>

    <script>
        let allActions = [];
        let allOrgs = [];
        let currentActionId = null;

        async function initMarketplace() {
            try {
                const [actionsRes, orgsRes, statsRes] = await Promise.all([
                    fetch("/api/actions/public/active"),
                    fetch("/api/organisations"),
                    fetch("/api/actions/public/stats")
                ]);
                if (actionsRes.ok) allActions = await actionsRes.json();
                if (orgsRes.ok) allOrgs = await orgsRes.json();
                let stats = { totalActions: 0, activeUsers: 0, totalDonations: 0 };
                if (statsRes.ok) stats = await statsRes.json();

                populateOrgFilter();
                updateStats(stats);
                filterActions();
            } catch (error) {
                console.error("Error:", error);
            }
        }

        function populateOrgFilter() {
            const select = document.getElementById("orgFilter");
            allOrgs.forEach(o => {
                const opt = document.createElement("option");
                opt.value = o.nom;
                opt.textContent = o.nom;
                select.appendChild(opt);
            });
        }

        function updateStats(stats) {
            document.getElementById("stat-actions").textContent = allActions.length || 0;
            document.getElementById("stat-orgs").textContent = allOrgs.length || 0;
            document.getElementById("stat-donated").textContent = "$" + (stats.totalDonations || 0).toLocaleString();
            document.getElementById("stat-causes").textContent = new Set(allActions.map(a => a.category)).size || 0;
        }

        function filterActions() {
            const query = document.getElementById("searchInput").value.toLowerCase();
            const category = document.getElementById("categoryFilter").value;
            const org = document.getElementById("orgFilter").value;
            const sort = document.getElementById("sortBy").value;

            let filtered = allActions.filter(a => {
                if (query && !(a.titre && a.titre.toLowerCase().includes(query)) && !(a.description && a.description.toLowerCase().includes(query))) return false;
                if (category && a.category !== category) return false;
                if (org && a.organisationName !== org) return false;
                return true;
            });

            switch (sort) {
                case "popular":
                    filtered.sort((a, b) => (b.participantCount || 0) - (a.participantCount || 0));
                    break;
                case "goal":
                    filtered.sort((a, b) => (b.objectifMontant || 0) - (a.objectifMontant || 0));
                    break;
                case "progress":
                    filtered.sort((a, b) => (b.montantCollecte || 0) - (a.montantCollecte || 0));
                    break;
                default:
                    filtered.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));
            }
            renderGrid(filtered);
        }

        function renderGrid(actions) {
            const grid = document.getElementById("actions-grid");
            document.getElementById("results-count").textContent = actions.length + " results";
            if (actions.length === 0) {
                grid.innerHTML = '<div class="col-span-full text-center py-12"><i class="fas fa-search text-4xl text-gray-300 mb-3"></i><p class="text-gray-500">No causes found</p></div>';
                return;
            }
            grid.innerHTML = actions.map(a => {
                const progress = a.objectifMontant ? Math.min((a.montantCollecte / a.objectifMontant) * 100, 100) : 0;
                return `
                <div class="bg-white rounded-xl shadow-sm border overflow-hidden hover:shadow-md transition group">
                    <div class="relative h-40 bg-gradient-to-br from-blue-400 to-purple-600">
                        <div class="absolute inset-0 flex items-center justify-center">
                            <i class="fas fa-hand-holding-heart text-white text-5xl opacity-20"></i>
                        </div>
                        <div class="absolute top-3 left-3">
                            <span class="bg-white bg-opacity-90 text-blue-600 text-xs px-2 py-1 rounded-full font-medium">${a.category || 'Charity'}</span>
                        </div>
                        ${a.organisationName ? `<div class="absolute bottom-3 left-3 flex items-center gap-2 bg-black bg-opacity-30 rounded-full px-3 py-1">
                            <i class="fas fa-building text-white text-xs"></i>
                            <span class="text-white text-xs">${a.organisationName}</span>
                        </div>` : ''}
                    </div>
                    <div class="p-4">
                        <h3 class="font-bold text-gray-800 mb-1 line-clamp-1">${a.titre || 'Charity Action'}</h3>
                        <p class="text-sm text-gray-500 mb-3 line-clamp-2">${a.description || ''}</p>
                        <div class="mb-3">
                            <div class="flex justify-between text-xs mb-1">
                                <span class="font-semibold text-blue-600">$${(a.montantCollecte || 0).toLocaleString()}</span>
                                <span class="text-gray-500">of $${(a.objectifMontant || 0).toLocaleString()}</span>
                            </div>
                            <div class="w-full bg-gray-200 rounded-full h-2">
                                <div class="bg-gradient-to-r from-blue-500 to-blue-600 h-2 rounded-full transition-all" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        <div class="flex items-center justify-between text-xs text-gray-500 mb-3">
                            <span><i class="fas fa-users"></i> ${a.participantCount || 0} supporters</span>
                            <span><i class="fas fa-map-marker-alt"></i> ${a.lieu || 'N/A'}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="openDonationModal(${a.id}, '${a.titre}')" class="flex-1 bg-blue-600 text-white py-2 rounded-lg text-sm font-medium hover:bg-blue-700 transition">
                                <i class="fas fa-heart"></i> Donate
                            </button>
                            <button onclick="viewDetails(${a.id})" class="px-4 py-2 border border-gray-300 rounded-lg text-sm text-gray-600 hover:bg-gray-50 transition">
                                <i class="fas fa-info-circle"></i>
                            </button>
                        </div>
                    </div>
                </div>
            `}).join("");
        }

        function setAmount(val) {
            document.getElementById("donationAmount").value = val;
        }

        function openDonationModal(id, title) {
            currentActionId = id;
            document.getElementById("modalContent").innerHTML = `<p class="text-gray-600">You're supporting: <strong>${title}</strong></p>`;
            document.getElementById("donationModal").classList.remove("hidden");
        }

        function closeModal() {
            document.getElementById("donationModal").classList.add("hidden");
            document.getElementById("donationAmount").value = "";
            document.getElementById("donationMessage").value = "";
            currentActionId = null;
        }

        async function submitDonation() {
            const amount = parseFloat(document.getElementById("donationAmount").value);
            const message = document.getElementById("donationMessage").value;
            if (!amount || amount <= 0) {
                alert("Please enter a valid amount");
                return;
            }
            try {
                const res = await fetch("/api/donations", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        actionChariteId: currentActionId,
                        amount: amount,
                        message: message
                    })
                });
                if (res.ok) {
                    alert("Thank you for your donation! 🎉");
                    closeModal();
                    initMarketplace();
                } else {
                    const err = await res.text();
                    alert("Donation failed: " + err);
                }
            } catch (error) {
                alert("Error processing donation");
            }
        }

        function viewDetails(id) {
            const a = allActions.find(x => x.id === id);
            if (!a) return;
            const progress = a.objectifMontant ? Math.min((a.montantCollecte / a.objectifMontant) * 100, 100) : 0;
            document.getElementById("detail-title").textContent = a.titre || 'Action Details';
            document.getElementById("detailContent").innerHTML = `
                <div class="grid grid-cols-2 gap-4">
                    <div class="p-4 bg-blue-50 rounded-lg text-center">
                        <div class="text-2xl font-bold text-blue-600">$${(a.montantCollecte || 0).toLocaleString()}</div>
                        <div class="text-xs text-gray-500">Raised</div>
                    </div>
                    <div class="p-4 bg-green-50 rounded-lg text-center">
                        <div class="text-2xl font-bold text-green-600">$${(a.objectifMontant || 0).toLocaleString()}</div>
                        <div class="text-xs text-gray-500">Goal</div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between text-sm mb-1">
                        <span class="font-medium">Progress</span>
                        <span>${progress.toFixed(1)}%</span>
                    </div>
                    <div class="w-full bg-gray-200 rounded-full h-3">
                        <div class="bg-gradient-to-r from-blue-500 to-blue-600 h-3 rounded-full" style="width: ${progress}%"></div>
                    </div>
                </div>
                <div class="grid grid-cols-2 gap-4 text-sm">
                    <div><span class="text-gray-500">Organization:</span><br><span class="font-medium">${a.organisationName || 'N/A'}</span></div>
                    <div><span class="text-gray-500">Category:</span><br><span class="font-medium">${a.category || 'N/A'}</span></div>
                    <div><span class="text-gray-500">Location:</span><br><span class="font-medium">${a.lieu || 'N/A'}</span></div>
                    <div><span class="text-gray-500">Supporters:</span><br><span class="font-medium">${a.participantCount || 0}</span></div>
                </div>
                <div>
                    <span class="text-gray-500 text-sm">Description:</span>
                    <p class="text-gray-700 mt-1">${a.description || 'No description available'}</p>
                </div>
                <button onclick="closeDetails(); openDonationModal(${a.id}, '${a.titre}')" class="w-full bg-blue-600 text-white py-3 rounded-lg hover:bg-blue-700 transition font-semibold">
                    <i class="fas fa-heart"></i> Donate Now
                </button>
            `;
            document.getElementById("detailsModal").classList.remove("hidden");
        }

        function closeDetails() {
            document.getElementById("detailsModal").classList.add("hidden");
        }

        document.getElementById("donationModal")?.addEventListener("click", e => { if (e.target.id === "donationModal") closeModal(); });
        document.getElementById("detailsModal")?.addEventListener("click", e => { if (e.target.id === "detailsModal") closeDetails(); });

        window.addEventListener("load", initMarketplace);
    </script>
</body>
</html>
