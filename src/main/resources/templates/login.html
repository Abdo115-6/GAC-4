<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In - GAC Charity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">
    <div class="w-full max-w-md px-4">
        <div class="text-center mb-8">
            <div class="w-16 h-16 bg-gradient-to-br from-blue-600 to-purple-600 rounded-2xl flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-hand-holding-heart text-white text-2xl"></i>
            </div>
            <h1 class="text-2xl font-bold text-gray-800">GAC Charity</h1>
            <p class="text-gray-500">Sign in to your account</p>
        </div>
        <div class="bg-white rounded-xl shadow-sm border p-8">
            <div id="error-message" class="mb-4 p-3 bg-red-50 border border-red-200 text-red-700 rounded-lg text-sm hidden"></div>
            <div id="success-message" class="mb-4 p-3 bg-green-50 border border-green-200 text-green-700 rounded-lg text-sm hidden"></div>
            <form action="/login" method="POST" class="space-y-5">
                <div>
                    <label for="username" class="block text-sm font-medium text-gray-700 mb-1">Email</label>
                    <input type="email" id="username" name="username" required
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <div>
                    <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Password</label>
                    <input type="password" id="password" name="password" required
                        class="w-full px-4 py-2.5 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500">
                </div>
                <button type="submit" class="w-full bg-blue-600 text-white py-2.5 rounded-lg hover:bg-blue-700 transition font-medium">
                    <i class="fas fa-sign-in-alt mr-2"></i>Sign In
                </button>
            </form>
            <p class="mt-6 text-center text-sm text-gray-500">
                Don't have an account?
                <a href="/register" class="text-blue-600 hover:text-blue-700 font-medium">Create one</a>
            </p>
        </div>
    </div>
    <script>
        const params = new URLSearchParams(window.location.search);
        if (params.get("error")) {
            const el = document.getElementById("error-message");
            el.textContent = "Invalid email or password";
            el.classList.remove("hidden");
        }
        if (params.get("registered")) {
            const el = document.getElementById("success-message");
            el.textContent = "Account created! Please sign in.";
            el.classList.remove("hidden");
        }
        if (params.get("logout")) {
            const el = document.getElementById("success-message");
            el.textContent = "You've been logged out.";
            el.classList.remove("hidden");
        }
    </script>
</body>
</html>
