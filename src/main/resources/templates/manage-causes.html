<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Causes - GAC Charity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-gray-50">
    <div th:replace="fragments/layout :: navbar"></div>

    <div class="flex">
        <div th:replace="fragments/layout :: sidebar"></div>

        <main class="flex-1 ml-64 p-6">
            <div class="flex items-center justify-between mb-8">
                <div>
                    <h1 class="text-2xl font-bold text-gray-800">Manage Charity Causes</h1>
                    <p class="text-gray-500">Create, edit and manage charity causes</p>
                </div>
                <button onclick="openActionModal()" class="px-4 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition font-medium text-sm flex items-center gap-2">
                    <i class="fas fa-plus"></i> Add Cause
                </button>
            </div>

            <!-- Stats -->
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 mb-8">
                <div class="bg-white rounded-xl shadow-sm border p-4">
                    <div class="text-2xl font-bold text-gray-800" id="total-actions">0</div>
                    <div class="text-xs text-gray-500">Total Causes</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border p-4">
                    <div class="text-2xl font-bold text-blue-600" id="total-goal">$0</div>
                    <div class="text-xs text-gray-500">Total Goal</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border p-4">
                    <div class="text-2xl font-bold text-green-600" id="total-raised">$0</div>
                    <div class="text-xs text-gray-500">Total Raised</div>
                </div>
                <div class="bg-white rounded-xl shadow-sm border p-4">
                    <div class="text-2xl font-bold text-purple-600" id="total-orgs">0</div>
                    <div class="text-xs text-gray-500">Organizations</div>
                </div>
            </div>

            <!-- Search & Filter -->
            <div class="bg-white rounded-xl shadow-sm border p-4 mb-6">
                <div class="flex flex-wrap gap-3">
                    <div class="flex-1 min-w-[200px] relative">
                        <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
                        <input type="text" id="searchInput" placeholder="Search causes..." oninput="filterActions()" class="w-full pl-10 pr-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <select id="categoryFilter" onchange="filterActions()" class="px-4 py-2 border border-gray-300 rounded-lg text-sm">
                        <option value="">All Categories</option>
                        <option value="EDUCATION">Education</option>
                        <option value="HEALTH">Health</option>
                        <option value="ENVIRONMENT">Environment</option>
                        <option value="POVERTY">Poverty</option>
                        <option value="DISASTER_RELIEF">Disaster Relief</option>
                        <option value="ANIMAL_WELFARE">Animal Welfare</option>
                        <option value="OTHER">Other</option>
                    </select>
                    <select id="orgFilter" onchange="filterActions()" class="px-4 py-2 border border-gray-300 rounded-lg text-sm">
                        <option value="">All Organizations</option>
                    </select>
                </div>
            </div>

            <!-- Causes Table -->
            <div class="bg-white rounded-xl shadow-sm border overflow-hidden">
                <div class="overflow-x-auto">
                    <table class="w-full text-sm">
                        <thead class="bg-gray-50 border-b">
                            <tr>
                                <th class="text-left p-4 font-medium text-gray-600">Title</th>
                                <th class="text-left p-4 font-medium text-gray-600">Organization</th>
                                <th class="text-left p-4 font-medium text-gray-600">Category</th>
                                <th class="text-left p-4 font-medium text-gray-600">Goal</th>
                                <th class="text-left p-4 font-medium text-gray-600">Raised</th>
                                <th class="text-left p-4 font-medium text-gray-600">Progress</th>
                                <th class="text-left p-4 font-medium text-gray-600">Location</th>
                                <th class="text-left p-4 font-medium text-gray-600">Actions</th>
                            </tr>
                        </thead>
                        <tbody id="actions-table-body"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <div th:replace="fragments/layout :: footer"></div>

    <!-- Add/Edit Action Modal -->
    <div id="actionModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl p-8 max-w-lg w-full mx-4 max-h-[90vh] overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xl font-bold text-gray-800" id="modalTitle">Add Charity Cause</h3>
                <button onclick="closeActionModal()" class="text-gray-400 hover:text-gray-600"><i class="fas fa-times"></i></button>
            </div>
            <form id="actionForm" class="space-y-4">
                <input type="hidden" id="editActionId">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Title *</label>
                    <input type="text" id="actTitre" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Description *</label>
                    <textarea id="actDescription" required rows="3" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Category *</label>
                        <select id="actCategory" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Select...</option>
                            <option value="EDUCATION">Education</option>
                            <option value="HEALTH">Health</option>
                            <option value="ENVIRONMENT">Environment</option>
                            <option value="POVERTY">Poverty</option>
                            <option value="DISASTER_RELIEF">Disaster Relief</option>
                            <option value="ANIMAL_WELFARE">Animal Welfare</option>
                            <option value="OTHER">Other</option>
                        </select>
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Organization *</label>
                        <select id="actOrgId" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                            <option value="">Select...</option>
                        </select>
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Location *</label>
                    <input type="text" id="actLieu" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                </div>
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Goal Amount ($) *</label>
                        <input type="number" id="actGoal" required min="1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Action Date *</label>
                        <input type="date" id="actDate" required class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500">
                    </div>
                </div>
                <div class="flex gap-3 pt-2">
                    <button type="submit" class="flex-1 bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 transition font-medium">
                        <i class="fas fa-save"></i> <span id="submitBtnText">Create Cause</span>
                    </button>
                    <button type="button" onclick="closeActionModal()" class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition text-gray-700">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Delete Confirmation -->
    <div id="deleteModal" class="hidden fixed inset-0 bg-black bg-opacity-50 z-50 flex items-center justify-center">
        <div class="bg-white rounded-xl p-8 max-w-sm w-full mx-4 text-center">
            <div class="w-16 h-16 bg-red-100 rounded-full flex items-center justify-center mx-auto mb-4">
                <i class="fas fa-exclamation-triangle text-red-600 text-2xl"></i>
            </div>
            <h3 class="text-xl font-bold text-gray-800 mb-2">Delete Cause</h3>
            <p class="text-gray-500 mb-6">This will permanently delete this charity cause.</p>
            <input type="hidden" id="deleteActionId">
            <div class="flex gap-3">
                <button onclick="confirmDelete()" class="flex-1 bg-red-600 text-white py-2 rounded-lg hover:bg-red-700 transition font-medium">Delete</button>
                <button onclick="closeDeleteModal()" class="flex-1 py-2 border border-gray-300 rounded-lg hover:bg-gray-50 transition">Cancel</button>
            </div>
        </div>
    </div>

    <script>
        let allActions = [];
        let allOrgs = [];

        async function loadPage() {
            try {
                const [actionsRes, orgsRes] = await Promise.all([
                    fetch("/api/actions/public/active"),
                    fetch("/api/organisations/public/validated")
                ]);
                if (actionsRes.ok) allActions = await actionsRes.json();
                if (orgsRes.ok) allOrgs = await orgsRes.json();
                populateOrgSelects();
                updateStats();
                renderTable(allActions);
            } catch (e) {
                console.error("Error:", e);
            }
        }

        function populateOrgSelects() {
            const selects = ["actOrgId", "orgFilter"];
            selects.forEach(id => {
                const sel = document.getElementById(id);
                if (!sel) return;
                sel.innerHTML = '<option value="">' + (id === "orgFilter" ? 'All Organizations' : 'Select...') + '</option>';
                allOrgs.forEach(o => {
                    const opt = document.createElement("option");
                    opt.value = o.id;
                    opt.textContent = o.nom;
                    sel.appendChild(opt);
                });
            });
        }

        function updateStats() {
            const total = allActions.length;
            const goal = allActions.reduce((s, a) => s + (a.objectifMontant || 0), 0);
            const raised = allActions.reduce((s, a) => s + (a.montantCollecte || 0), 0);
            document.getElementById("total-actions").textContent = total;
            document.getElementById("total-goal").textContent = "$" + goal.toLocaleString();
            document.getElementById("total-raised").textContent = "$" + raised.toLocaleString();
            document.getElementById("total-orgs").textContent = allOrgs.length;
        }

        function renderTable(actions) {
            const tbody = document.getElementById("actions-table-body");
            if (actions.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="text-center py-8 text-gray-500">No causes found. Add your first cause!</td></tr>';
                return;
            }
            tbody.innerHTML = actions.map(a => {
                const progress = a.objectifMontant ? Math.min((a.montantCollecte / a.objectifMontant) * 100, 100) : 0;
                return `<tr class="border-b hover:bg-gray-50">
                    <td class="p-4 font-medium text-gray-800">${a.titre || 'N/A'}</td>
                    <td class="p-4 text-gray-600">${a.organisationName || 'N/A'}</td>
                    <td class="p-4"><span class="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-full">${a.category || 'N/A'}</span></td>
                    <td class="p-4 font-semibold">$${(a.objectifMontant || 0).toLocaleString()}</td>
                    <td class="p-4 text-green-600 font-semibold">$${(a.montantCollecte || 0).toLocaleString()}</td>
                    <td class="p-4">
                        <div class="flex items-center gap-2">
                            <div class="w-20 bg-gray-200 rounded-full h-2">
                                <div class="bg-blue-600 h-2 rounded-full" style="width: ${progress}%"></div>
                            </div>
                            <span class="text-xs text-gray-500">${progress.toFixed(0)}%</span>
                        </div>
                    </td>
                    <td class="p-4 text-gray-600">${a.lieu || 'N/A'}</td>
                    <td class="p-4">
                        <div class="flex gap-1">
                            <button onclick="editAction(${a.id})" class="p-2 text-gray-400 hover:text-blue-600 hover:bg-blue-50 rounded-lg" title="Edit"><i class="fas fa-edit"></i></button>
                            <button onclick="openDeleteModal(${a.id})" class="p-2 text-gray-400 hover:text-red-600 hover:bg-red-50 rounded-lg" title="Delete"><i class="fas fa-trash"></i></button>
                        </div>
                    </td>
                </tr>`;
            }).join("");
        }

        function filterActions() {
            const q = document.getElementById("searchInput").value.toLowerCase();
            const cat = document.getElementById("categoryFilter").value;
            const orgId = document.getElementById("orgFilter").value;
            let filtered = allActions.filter(a => {
                if (q && !(a.titre && a.titre.toLowerCase().includes(q)) && !(a.description && a.description.toLowerCase().includes(q))) return false;
                if (cat && a.category !== cat) return false;
                if (orgId && a.organisationId != orgId) return false;
                return true;
            });
            renderTable(filtered);
        }

        // Modal CRUD
        function openActionModal() {
            document.getElementById("modalTitle").textContent = "Add Charity Cause";
            document.getElementById("submitBtnText").textContent = "Create Cause";
            document.getElementById("editActionId").value = "";
            document.getElementById("actionForm").reset();
            document.getElementById("actionModal").classList.remove("hidden");
        }

        function closeActionModal() {
            document.getElementById("actionModal").classList.add("hidden");
        }

        document.getElementById("actionForm")?.addEventListener("submit", async (e) => {
            e.preventDefault();
            const editId = document.getElementById("editActionId").value;
            const data = {
                titre: document.getElementById("actTitre").value,
                description: document.getElementById("actDescription").value,
                category: document.getElementById("actCategory").value,
                lieu: document.getElementById("actLieu").value,
                objectifMontant: parseFloat(document.getElementById("actGoal").value),
                dateAction: document.getElementById("actDate").value,
                organisationId: parseInt(document.getElementById("actOrgId").value)
            };
            try {
                const url = editId ? `/api/actions/${editId}` : "/api/actions";
                const method = editId ? "PUT" : "POST";
                const res = await fetch(url, { method, headers: { "Content-Type": "application/json" }, body: JSON.stringify(data) });
                if (res.ok) {
                    alert(editId ? "Cause updated!" : "Cause created!");
                    closeActionModal();
                    loadPage();
                } else {
                    const err = await res.text();
                    alert("Error: " + err);
                }
            } catch (e) {
                alert("Error saving cause");
            }
        });

        async function editAction(id) {
            try {
                const res = await fetch(`/api/actions/${id}`);
                if (res.ok) {
                    const a = await res.json();
                    document.getElementById("modalTitle").textContent = "Edit Charity Cause";
                    document.getElementById("submitBtnText").textContent = "Update Cause";
                    document.getElementById("editActionId").value = a.id;
                    document.getElementById("actTitre").value = a.titre || '';
                    document.getElementById("actDescription").value = a.description || '';
                    document.getElementById("actCategory").value = a.category || '';
                    document.getElementById("actLieu").value = a.lieu || '';
                    document.getElementById("actGoal").value = a.objectifMontant || '';
                    document.getElementById("actDate").value = a.dateAction || '';
                    document.getElementById("actOrgId").value = a.organisationId || '';
                    document.getElementById("actionModal").classList.remove("hidden");
                }
            } catch (e) {
                alert("Error loading cause");
            }
        }

        function openDeleteModal(id) {
            document.getElementById("deleteActionId").value = id;
            document.getElementById("deleteModal").classList.remove("hidden");
        }

        function closeDeleteModal() {
            document.getElementById("deleteModal").classList.add("hidden");
        }

        async function confirmDelete() {
            const id = document.getElementById("deleteActionId").value;
            try {
                const res = await fetch(`/api/actions/${id}`, { method: "DELETE" });
                if (res.ok) {
                    alert("Cause deleted!");
                    closeDeleteModal();
                    loadPage();
                } else {
                    alert("Error deleting cause");
                }
            } catch (e) {
                alert("Error deleting cause");
            }
        }

        document.getElementById("actionModal")?.addEventListener("click", e => { if (e.target.id === "actionModal") closeActionModal(); });
        document.getElementById("deleteModal")?.addEventListener("click", e => { if (e.target.id === "deleteModal") closeDeleteModal(); });

        window.addEventListener("load", loadPage);
    </script>
</body>
</html>
