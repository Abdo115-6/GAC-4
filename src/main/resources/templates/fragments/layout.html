<div th:fragment="navbar">
  <nav class="bg-white shadow-sm border-b fixed w-full z-50">
    <div class="max-w-7xl mx-auto px-4">
      <div class="flex justify-between items-center h-16">
        <div class="flex items-center gap-8">
          <a href="/" class="flex items-center gap-2">
            <div class="w-8 h-8 bg-gradient-to-br from-blue-600 to-purple-600 rounded-lg flex items-center justify-center">
              <i class="fas fa-hand-holding-heart text-white text-sm"></i>
            </div>
            <span class="text-xl font-bold text-gray-800">GAC Charity</span>
          </a>
          <div class="hidden md:flex items-center gap-1">
            <a href="/" class="px-3 py-2 text-sm font-medium text-blue-600 bg-blue-50 rounded-lg">Dashboard</a>
            <a href="/marketplace" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">Marketplace</a>
            <a href="/organisations" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">Organizations</a>
            <a href="/profile" class="px-3 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">My Profile</a>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <span th:if="${#authentication != null and #authentication.authenticated}" class="text-sm text-gray-600">
            <i class="fas fa-user-circle text-gray-400"></i>
            <span th:text="${#authentication.name}"></span>
          </span>
          <a th:if="${#authentication == null or !#authentication.authenticated}" href="/login" class="px-4 py-2 bg-blue-600 text-white text-sm rounded-lg hover:bg-blue-700 transition">Sign In</a>
          <a th:if="${#authentication != null and #authentication.authenticated}" href="/logout" class="px-4 py-2 text-sm text-gray-600 hover:text-red-600 transition"><i class="fas fa-sign-out-alt"></i></a>
        </div>
      </div>
    </div>
  </nav>
  <div class="h-16"></div>
</div>

<div th:fragment="sidebar">
  <aside class="w-64 bg-white border-r h-[calc(100vh-4rem)] fixed left-0 top-16 overflow-y-auto">
    <div class="p-4">
      <div class="mb-6">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Main</p>
        <nav class="space-y-1">
          <a href="/" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-blue-600 bg-blue-50 rounded-lg">
            <i class="fas fa-chart-pie w-5 text-center"></i> Dashboard
          </a>
          <a href="/marketplace" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">
            <i class="fas fa-store w-5 text-center"></i> Marketplace
          </a>
        </nav>
      </div>
      <div class="mb-6">
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Management</p>
        <nav class="space-y-1">
          <a href="/organisations" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">
            <i class="fas fa-building w-5 text-center"></i> Organizations
          </a>
          <a href="/manage-causes" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">
            <i class="fas fa-hands-helping w-5 text-center"></i> Manage Causes
          </a>
        </nav>
      </div>
      <div>
        <p class="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Account</p>
        <nav class="space-y-1">
          <a href="/profile" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 hover:text-blue-600 hover:bg-blue-50 rounded-lg transition">
            <i class="fas fa-user w-5 text-center"></i> My Profile
          </a>
          <a href="/logout" class="flex items-center gap-3 px-3 py-2 text-sm font-medium text-gray-600 hover:text-red-600 hover:bg-red-50 rounded-lg transition">
            <i class="fas fa-sign-out-alt w-5 text-center"></i> Logout
          </a>
        </nav>
      </div>
    </div>
  </aside>
</div>

<div th:fragment="footer">
  <footer class="bg-white border-t py-6 mt-8">
    <div class="max-w-7xl mx-auto px-4 text-center text-sm text-gray-500">
      <p>&copy; 2026 GAC Charity. All rights reserved.</p>
    </div>
  </footer>
</div>
