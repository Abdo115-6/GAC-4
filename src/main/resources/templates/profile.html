<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile - GAC Charity</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
</head>
<body class="bg-gray-50">
    <div th:replace="fragments/layout :: navbar"></div>

    <div class="flex">
        <div th:replace="fragments/layout :: sidebar"></div>

        <main class="flex-1 ml-64 p-6">
            <div class="mb-8">
                <h1 class="text-2xl font-bold text-gray-800">My Profile</h1>
                <p class="text-gray-500">Manage your account information</p>
            </div>

            <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div class="lg:col-span-1">
                    <div class="bg-white rounded-xl shadow-sm border p-6 text-center">
                        <div class="w-24 h-24 bg-gradient-to-br from-blue-400 to-purple-500 rounded-full flex items-center justify-center mx-auto mb-4">
                            <i class="fas fa-user text-white text-3xl"></i>
                        </div>
                        <h2 class="text-xl font-bold text-gray-800" id="profile-name">User</h2>
                        <p class="text-gray-500 text-sm" id="profile-email">user@example.com</p>
                        <div class="mt-4 pt-4 border-t">
                            <div class="flex justify-between text-sm mb-2">
                                <span class="text-gray-500">Member since</span>
                                <span id="profile-joined" class="font-medium">N/A</span>
                            </div>
                            <div class="flex justify-between text-sm">
                                <span class="text-gray-500">Role</span>
                                <span id="profile-role" class="font-medium">User</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="lg:col-span-2">
                    <div class="bg-white rounded-xl shadow-sm border p-6">
                        <h2 class="text-lg font-bold text-gray-800 mb-6">Account Details</h2>
                        <div id="profile-details" class="space-y-4"></div>
                    </div>

                    <div class="bg-white rounded-xl shadow-sm border p-6 mt-6">
                        <h2 class="text-lg font-bold text-gray-800 mb-4">My Recent Donations</h2>
                        <div id="my-donations" class="space-y-3"></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div th:replace="fragments/layout :: footer"></div>

    <script>
        let userId = null;

        async function loadProfile() {
            try {
                const res = await fetch("/api/users/profile");
                if (res.ok) {
                    const user = await res.json();
                    userId = user.id;
                    document.getElementById("profile-name").textContent = (user.firstName || '') + ' ' + (user.lastName || '');
                    document.getElementById("profile-email").textContent = user.email || '';
                    document.getElementById("profile-joined").textContent = user.createdAt ? new Date(user.createdAt).toLocaleDateString() : 'N/A';
                    document.getElementById("profile-role").textContent = user.isAdmin ? 'Admin' : 'User';

                    document.getElementById("profile-details").innerHTML = `
                        <div class="grid grid-cols-2 gap-4">
                            <div><span class="text-sm text-gray-500">First Name</span><p class="font-medium">${user.firstName || 'N/A'}</p></div>
                            <div><span class="text-sm text-gray-500">Last Name</span><p class="font-medium">${user.lastName || 'N/A'}</p></div>
                            <div><span class="text-sm text-gray-500">Email</span><p class="font-medium">${user.email || 'N/A'}</p></div>
                            <div><span class="text-sm text-gray-500">Phone</span><p class="font-medium">${user.phone || 'N/A'}</p></div>
                            <div><span class="text-sm text-gray-500">Bio</span><p class="font-medium">${user.bio || 'No bio'}</p></div>
                        </div>
                    `;

                    // Load donations
                    const donRes = await fetch(`/api/donations/user/${user.id}`);
                    if (donRes.ok) {
                        const donations = await donRes.json();
                        const container = document.getElementById("my-donations");
                        if (donations.length === 0) {
                            container.innerHTML = '<p class="text-gray-500 text-sm text-center py-6">No donations yet</p>';
                        } else {
                            container.innerHTML = donations.map(d => `
                                <div class="flex items-center justify-between p-3 bg-gray-50 rounded-lg">
                                    <div>
                                        <div class="text-sm font-medium">$${d.montant} - ${d.actionTitle || 'N/A'}</div>
                                        <div class="text-xs text-gray-500">${d.status} | ${d.createdAt ? new Date(d.createdAt).toLocaleDateString() : 'N/A'}</div>
                                    </div>
                                    <span class="text-xs px-2 py-1 rounded-full ${d.status === 'CONFIRMED' ? 'bg-green-100 text-green-700' : 'bg-yellow-100 text-yellow-700'}">${d.status}</span>
                                </div>
                            `).join("");
                        }
                    }
                }
            } catch (e) {
                console.error("Error loading profile:", e);
            }
        }

        window.addEventListener("load", loadProfile);
    </script>
</body>
</html>
